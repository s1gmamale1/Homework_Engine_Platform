<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETS — Homework Engine Blueprint — Presentation</title>
<style>
  :root {
    --bg:#0a0c10;--bg2:#0f1318;--bg3:#151a22;
    --ink3:#1e2530;--ink4:#2a3340;
    --text-hi:#e8edf5;--text-mid:#8b95a8;--text-lo:#4a5568;
    --amber:#f59e0b;--blue:#3b82f6;--green:#10b981;
    --purple:#8b5cf6;--red:#ef4444;--cyan:#06b6d4;--orange:#f97316;
    --mono:'JetBrains Mono','Fira Code','Courier New',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text-hi);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}

  /* NAV BAR */
  .navbar{position:fixed;top:0;width:100%;background:var(--bg2);border-bottom:1px solid var(--ink3);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100}
  .nav-left{display:flex;align-items:center;gap:16px}
  .nav-logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--amber);letter-spacing:.1em}
  .nav-title{font-size:12px;color:var(--text-mid)}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-counter{font-family:var(--mono);font-size:11px;color:var(--text-lo)}
  .nav-btn{padding:6px 16px;border:1px solid var(--ink4);border-radius:4px;background:transparent;color:var(--text-mid);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
  .nav-btn:hover{border-color:var(--amber);color:var(--text-hi)}
  .nav-btn.primary{background:var(--amber);color:#000;border-color:var(--amber)}
  .nav-btn:disabled{opacity:.3;cursor:not-allowed}

  /* PROGRESS */
  .progress-bar{position:fixed;top:46px;width:100%;height:3px;background:var(--ink3);z-index:99}
  .progress-fill{height:100%;background:var(--amber);transition:width .4s ease;border-radius:0 2px 2px 0}

  /* SLIDE */
  .slide-container{margin-top:64px;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 80px}
  .slide{max-width:900px;width:100%;animation:fadeIn .4s ease}
  .slide-badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;padding:4px 14px;border-radius:2px;margin-bottom:16px}
  .slide h1{font-size:32px;font-weight:700;margin-bottom:8px;line-height:1.3}
  .slide h2{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--text-hi)}
  .slide h3{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--amber)}
  .slide p,.slide li{font-size:15px;line-height:1.8;color:var(--text-mid)}
  .slide p{margin-bottom:12px}
  .slide ul{margin:8px 0 16px 20px}
  .slide li{margin-bottom:6px}
  .slide strong{color:var(--text-hi)}
  .slide em{color:var(--amber);font-style:normal}
  .subtitle{font-size:14px;color:var(--text-lo);margin-bottom:32px}

  /* CARDS */
  .card{background:var(--bg3);border:1px solid var(--ink3);border-radius:8px;padding:24px;margin-bottom:16px}
  .card-accent{border-left:3px solid var(--amber)}
  .card-green{border-left:3px solid var(--green)}
  .card-red{border-left:3px solid var(--red)}
  .card-purple{border-left:3px solid var(--purple)}
  .card-cyan{border-left:3px solid var(--cyan)}
  .card-blue{border-left:3px solid var(--blue)}

  /* TAGS */
  .tag{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:2px;margin:2px}
  .tag-amber{color:var(--amber);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25)}
  .tag-green{color:var(--green);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
  .tag-red{color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)}
  .tag-purple{color:var(--purple);background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25)}
  .tag-cyan{color:var(--cyan);background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25)}
  .tag-blue{color:var(--blue);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25)}
  .tag-orange{color:var(--orange);background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25)}
  .tag-lo{color:var(--text-lo);background:rgba(74,85,104,.15);border:1px solid rgba(74,85,104,.3)}

  /* FLOW CHART */
  .flow{display:flex;flex-direction:column;gap:8px;margin:16px 0}
  .flow-step{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);border:1px solid var(--ink3);border-radius:6px;font-size:13px;transition:all .2s}
  .flow-step:hover{border-color:var(--amber)}
  .flow-num{font-family:var(--mono);font-size:11px;color:var(--amber);font-weight:700;min-width:24px}
  .flow-arrow{text-align:center;color:var(--ink4);font-size:14px}

  /* TABLE */
  table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
  th{text-align:left;padding:8px 12px;background:var(--bg);border:1px solid var(--ink3);font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--amber)}
  td{padding:8px 12px;border:1px solid var(--ink3);color:var(--text-mid);line-height:1.5}
  tr:hover td{background:rgba(245,158,11,.02)}

  /* EXAMPLE BOX */
  .example{background:rgba(6,182,212,.04);border:1px solid rgba(6,182,212,.2);border-radius:6px;padding:16px;margin:16px 0}
  .example-label{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:.1em;margin-bottom:8px}
  .example p{font-size:13px;color:var(--text-mid)}

  /* CODE */
  .code{background:var(--bg);border:1px solid var(--ink3);border-radius:6px;padding:16px;margin:12px 0;font-family:var(--mono);font-size:12px;color:var(--text-mid);line-height:1.7;white-space:pre-wrap;overflow-x:auto}

  /* BIG NUMBER */
  .big-num{font-family:var(--mono);font-size:48px;font-weight:700;color:var(--amber);line-height:1}
  .big-label{font-size:13px;color:var(--text-lo);margin-top:4px}

  /* GRID */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

  .hidden{display:none!important}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr}.slide h1{font-size:24px}.slide-container{padding:24px 16px 60px}}

  /* KEYBOARD HINT */
  .key-hint{position:fixed;bottom:16px;right:24px;font-family:var(--mono);font-size:10px;color:var(--text-lo)}
  kbd{background:var(--ink3);border:1px solid var(--ink4);border-radius:3px;padding:2px 6px;font-size:10px}
</style>
</head>

// ====== NAVIGATION ======
let current = 0;
const total = slides.length;

function render() {
  document.getElementById('slide-area').innerHTML = slides[current];
  document.getElementById('slide-area').className = 'slide';
  void document.getElementById('slide-area').offsetWidth; // force reflow
  document.getElementById('slide-area').classList.add('fade-in');
  document.getElementById('counter').textContent = (current + 1) + ' / ' + total;
  document.getElementById('progress').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
  document.getElementById('btn-next').textContent = current === total - 1 ? 'Oxirgi' : 'Keyingi \u2192';
}

function next() { if (current < total - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

render();
</script>
