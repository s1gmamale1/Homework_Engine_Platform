<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentence Fill (Cloze) — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 240 15% 8%;
      --foreground: 0 0% 95%;
      --card: 240 12% 12%;
      --card-hover: 240 12% 16%;
      --primary: 162 93% 42%;
      --primary-foreground: 0 0% 100%;
      --muted: 240 10% 20%;
      --muted-foreground: 240 5% 55%;
      --border: 240 10% 22%;
      --success: 142 76% 45%;
      --warning: 38 92% 50%;
      --destructive: 0 72% 51%;
      --radius: 0.75rem;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 48px;
    }
    .container { width: 100%; max-width: 420px; }

    .phase-flow { display: flex; gap: 3px; margin-bottom: 12px; }
    .phase-segment { flex: 1; height: 4px; border-radius: 2px; background: hsl(var(--muted)); transition: background 0.3s; }
    .phase-segment.active { background: hsl(var(--primary)); }
    .phase-segment.done { background: hsl(var(--success)); }
    .phase-label {
      font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: hsl(var(--muted-foreground));
      text-align: center; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;
    }

    .header { text-align: center; margin-bottom: 16px; }
    .header h1 {
      font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, hsl(162, 93%, 42%), hsl(180, 85%, 35%));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { color: hsl(var(--muted-foreground)); font-size: 13px; margin-top: 4px; }

    .stats-bar {
      display: flex; gap: 8px; margin-bottom: 16px;
      background: hsla(var(--card), 0.6); backdrop-filter: blur(24px);
      border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 10px 12px;
    }
    .stat-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .stat-label { font-size: 10px; color: hsl(var(--muted-foreground)); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: hsl(var(--foreground)); margin-top: 2px; }
    .stat-value.level-val { color: hsl(var(--primary)); }
    .stat-value.velocity-val { color: hsl(var(--success)); }
    .stat-value.score-val { color: hsl(var(--success)); }

    /* Grade Card */
    .grade-card {
      background: hsla(var(--card), 0.8); backdrop-filter: blur(24px);
      border: 1px solid hsla(var(--border), 0.5); border-radius: 0.75rem;
      padding: 20px; text-align: center; margin: 16px 0;
    }
    .grade-level { font-family: 'Space Grotesk', sans-serif; font-size: 48px; font-weight: 800;
      background: linear-gradient(135deg, hsl(162,93%,42%), hsl(180,85%,35%));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .grade-label { font-size: 18px; font-weight: 700; margin: 4px 0; }
    .grade-detail { font-size: 13px; color: hsl(var(--muted-foreground)); margin: 2px 0; }

    .glass-card {
      background: hsla(var(--card), 0.6); backdrop-filter: blur(24px);
      border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 16px;
    }

    /* Progress */
    .progress-track {
      background: hsl(var(--muted)); border-radius: 100px; height: 6px;
      margin-bottom: 16px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, hsl(var(--primary)), hsl(180, 85%, 35%));
      border-radius: 100px; transition: width 0.4s;
    }

    /* Passage */
    .passage-card {
      background: hsla(var(--card), 0.8); border: 1px solid hsl(var(--border));
      border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    }
    .passage-subject {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: hsl(var(--primary)); margin-bottom: 12px;
    }
    .passage-text {
      font-size: 16px; font-weight: 600; color: hsl(var(--foreground));
      line-height: 2; margin-bottom: 16px;
    }
    .blank {
      display: inline-block;
      background: hsla(var(--primary), 0.1); border: 2px dashed hsl(var(--primary));
      border-radius: 6px; padding: 2px 14px; min-width: 60px; text-align: center;
      color: hsl(var(--primary)); font-weight: 800; transition: all 0.3s;
    }
    .blank.filled { border-style: solid; background: hsla(var(--primary), 0.2); }
    .blank.filled-correct { background: hsla(var(--success), 0.2); border-color: hsl(var(--success)); color: hsl(var(--success)); }
    .blank.filled-wrong { background: hsla(var(--destructive), 0.2); border-color: hsl(var(--destructive)); color: hsl(var(--destructive)); }

    .passage-hint {
      font-size: 12px; color: hsl(var(--muted-foreground)); font-style: italic; margin-bottom: 8px;
    }

    /* Word Bank */
    .word-bank-label {
      font-size: 12px; font-weight: 700; color: hsl(var(--muted-foreground));
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .word-bank {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .word-chip {
      padding: 10px 16px; border: 1px solid hsl(var(--border)); border-radius: var(--radius);
      background: hsla(var(--card), 0.8); cursor: pointer; font-size: 14px;
      font-family: 'Nunito', sans-serif; font-weight: 700; color: hsl(var(--foreground));
      transition: all 0.2s; user-select: none;
    }
    .word-chip:hover:not(.used) { border-color: hsl(var(--primary)); background: hsla(var(--primary), 0.1); }
    .word-chip.selected { border-color: hsl(var(--primary)); background: hsla(var(--primary), 0.2); color: hsl(var(--primary)); }
    .word-chip.used { opacity: 0.4; pointer-events: none; }

    /* Check Button */
    .check-btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, hsl(162, 93%, 42%), hsl(180, 85%, 35%));
      color: hsl(var(--primary-foreground)); font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
      margin-bottom: 12px;
    }
    .check-btn:active { transform: scale(0.97); }
    .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Feedback */
    .feedback-bar {
      min-height: 40px; display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius); margin-bottom: 12px; font-size: 14px; font-weight: 700;
      transition: all 0.3s;
    }
    .feedback-bar.correct { background: hsla(var(--success), 0.2); color: hsl(var(--success)); }
    .feedback-bar.wrong { background: hsla(var(--destructive), 0.2); color: hsl(var(--destructive)); }
    .feedback-bar.perfect { background: hsla(var(--primary), 0.2); color: hsl(var(--primary)); }

    .xp-toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: hsla(var(--card), 0.95); backdrop-filter: blur(24px);
      border: 1px solid hsl(var(--primary)); border-radius: var(--radius);
      padding: 16px 32px; font-family: 'Space Grotesk', sans-serif;
      font-size: 24px; font-weight: 700; color: hsl(var(--primary));
      z-index: 100; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .xp-toast.show { opacity: 1; }

    /* Completion */
    .completion-panel { text-align: center; padding: 24px 16px; }
    .completion-panel .big-emoji { font-size: 64px; margin: 16px 0; }
    .completion-panel h2 {
      font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px;
      background: linear-gradient(135deg, hsl(162, 93%, 42%), hsl(180, 85%, 35%));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .score-breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 16px 0; }
    .score-item { background: hsla(var(--muted), 0.3); border-radius: var(--radius); padding: 12px 8px; text-align: center; }
    .score-item .s-val { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
    .score-item .s-label { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 4px; }

    .restart-btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius);
      background: linear-gradient(135deg, hsl(162, 93%, 42%), hsl(180, 85%, 35%));
      color: hsl(var(--primary-foreground)); font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s;
    }
    .restart-btn:active { transform: scale(0.97); }

    #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }

    /* Question nav dots */
    .q-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .q-dot {
      width: 10px; height: 10px; border-radius: 50%; background: hsl(var(--muted));
      transition: all 0.3s;
    }
    .q-dot.active { background: hsl(var(--primary)); transform: scale(1.3); }
    .q-dot.done-correct { background: hsl(var(--success)); }
    .q-dot.done-wrong { background: hsl(var(--destructive)); }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <div class="container">
    <div class="phase-label">Session Phase</div>
    <div class="phase-flow">
      <div class="phase-segment done"></div>
      <div class="phase-segment done"></div>
      <div class="phase-segment done"></div>
      <div class="phase-segment active"></div>
      <div class="phase-segment"></div>
      <div class="phase-segment"></div>
      <div class="phase-segment"></div>
    </div>

    <div class="header">
      <h1>📝 Sentence Fill</h1>
      <p>Bo'sh joylarni to'ldiring</p>
    </div>

    <div class="stats-bar">
      <div class="stat-item"><span class="stat-label">Daraja</span><span class="stat-value level-val" id="level-display">0%</span></div>
      <div class="stat-item"><span class="stat-label">Tezlik</span><span class="stat-value velocity-val" id="velocity-display">n=0.00</span></div>
      <div class="stat-item"><span class="stat-label">Savol</span><span class="stat-value" id="q-counter">1/4</span></div>
    </div>

    <!-- Passage Area -->
    <div id="game-area">
      <div class="passage-card">
        <div class="passage-subject" id="passage-subject">🔬 Tabiiy fanlar</div>
        <div class="passage-text" id="passage-text"></div>
        <div class="passage-hint" id="passage-hint"></div>
      </div>

      <div class="word-bank-label">📦 So'zlar banki (bosing)</div>
      <div class="word-bank" id="word-bank"></div>

      <button class="check-btn" id="check-btn" onclick="checkAnswers()" disabled>✅ Tekshirish</button>

      <div class="feedback-bar" id="feedback-bar" style="display:none;"></div>

      <div class="q-dots" id="q-dots"></div>
    </div>

    <!-- Completion -->
    <div class="glass-card" id="completion-panel" style="display:none;">
      <div class="completion-panel">
        <div class="big-emoji">🎉</div>
        <h2>Ajoyib!</h2>
        <div class="grade-card" id="grade-card">
          <div class="grade-level" id="grade-level">0%</div>
          <div class="grade-label" id="grade-label">Novice ○</div>
          <div class="grade-detail" id="grade-velocity">Velocity: n=0.00</div>
          <div class="grade-detail" id="grade-speed">Fills correct: 0/0</div>
          <div class="grade-detail" id="grade-progress">~5 sessions to Proficient</div>
        </div>
        <div class="score-breakdown">
          <div class="score-item">
            <div class="s-val" style="color:hsl(var(--success));" id="final-correct">0</div>
            <div class="s-label">✅ To'g'ri</div>
          </div>
          <div class="score-item">
            <div class="s-val" style="color:hsl(var(--warning));" id="final-accuracy">0%</div>
            <div class="s-label">📈 Aniqlik</div>
          </div>
          <div class="score-item">
            <div class="s-val" style="color:hsl(var(--primary));" id="final-total">0</div>
            <div class="s-label">📝 Jami</div>
          </div>
        </div>
        <button class="restart-btn" onclick="restartGame()">🔄 Qayta boshlash</button>
      </div>
    </div>
  </div>

  <script>
    const passages = [
      {
        subject: '🔬 Tabiiy fanlar — Suv aylanishi',
        hint: '💡 Maslahat: Suvning holatlari haqida o\'ylang',
        text: `Quyosh suvni ___①___ qilganda, u bug'ga aylanadi va osmonga ko'tariladi. Bulutlarda bug' ___②___ bo'lib, yomg'ir yoki qor sifatida yerga qaytadi. Bu jarayon ___③___ deb ataladi.`,
        blanks: [
          { id: '①', answer: 'bug\'lantiradi', options: ['bug\'lantiradi', 'muzlaydi', 'qaynatadi', 'tortadi'] },
          { id: '②', answer: 'kondensatsiya', options: ['kondensatsiya', 'evaporatsiya', 'filtratsiya', 'distillyatsiya'] },
          { id: '③', answer: 'aylanish', options: ['aylanish', 'harakat', 'o\'zgarish', 'tarqalish'] }
        ],
        distractors: ['shamol', 'bosim']
      },
      {
        subject: '🌍 Geografiya — Yer qatlamlari',
        hint: '💡 Maslahat: Yerning ichki tuzilishi',
        text: `Yer uchta asosiy qatlamdan iborat: eng tashqi qatlam ___①___ deb ataladi. O'rtadagi qatlam ___②___, eng ichki qism esa ___③___ hisoblanadi.`,
        blanks: [
          { id: '①', answer: 'yer po\'sti', options: ['yer po\'sti', 'atmosfera', 'gidrosfera', 'litosfera'] },
          { id: '②', answer: 'mantiya', options: ['mantiya', 'yadro', 'qobiq', 'atmosfera'] },
          { id: '③', answer: 'yadro', options: ['yadro', 'mantiya', 'qobiq', 'tog'] }
        ],
        distractors: ['ocean', 'tog']
      },
      {
        subject: '🌱 Biologiya — O\'simliklar',
        hint: '💡 Maslahat: O\'simlik qismlarini eslang',
        text: `O'simliklar ___①___ orqali suv va minerallarni tuproqdan oladi. ___②___ orqali quyosh nurini yutadi va ___③___ jarayonida oziq modda hosil qiladi.`,
        blanks: [
          { id: '①', answer: 'ildiz', options: ['ildiz', 'poya', 'barg', 'gul'] },
          { id: '②', answer: 'barg', options: ['barg', 'ildiz', 'gul', 'meva'] },
          { id: '③', answer: 'fotosintez', options: ['fotosintez', 'nafas olish', 'bug\'lanish', 'o\'sish'] }
        ],
        distractors: ['poya', 'urug']
      },
      {
        subject: '⚡ Fizika — Elektr energiyasi',
        hint: '💡 Maslahat: Elektr zanjiri haqida o\'ylang',
        text: `Elektr toki ___①___ orqali o'tadi. Zanjir uzilsa, tok ___②___ qiladi. Batareya ___③___ manbai hisoblanadi.`,
        blanks: [
          { id: '①', answer: 'o\'tkazgich', options: ['o\'tkazgich', 'izolyator', 'magnit', 'rezistor'] },
          { id: '②', answer: 'to\'xtaydi', options: ['to\'xtaydi', 'oshadi', 'kamayadi', 'o\'zgaradi'] },
          { id: '③', answer: 'energiya', options: ['energiya', 'tok', 'kuchlanish', 'quvvat'] }
        ],
        distractors: ['sim', 'lampochka']
      }
    ];

    let currentPassage = 0;
    let totalCorrect = 0;
    let totalFills = 0;
    let filledBlanks = {};
    let activeBlankId = null;

    // Simulated history
    var sessionHistory = [
      { session: 1, accuracy: 25, timePerAnswer: 20, hints: 4 },
      { session: 2, accuracy: 40, timePerAnswer: 16, hints: 3 },
      { session: 3, accuracy: 55, timePerAnswer: 14, hints: 2 }
    ];
    var currentAccuracy = 0;
    var totalAttempts = 0;
    var correctCount = 0;

    function calcVelocity() {
      if (sessionHistory.length < 2) return 0.3;
      var first = sessionHistory[0].accuracy;
      var last = sessionHistory[sessionHistory.length - 1].accuracy;
      var sessions = sessionHistory.length;
      return Math.min(0.9, Math.max(0.1, (last - first) / (sessions * 20)));
    }

    function getGradeLabel(acc) {
      if (acc >= 85) return { label: 'Mastered ★', color: 'hsl(var(--success))' };
      if (acc >= 60) return { label: 'Proficient ✓', color: 'hsl(var(--success))' };
      if (acc >= 30) return { label: 'Apprentice △', color: 'hsl(var(--warning))' };
      return { label: 'Novice ○', color: 'hsl(var(--muted-foreground))' };
    }

    function updateGradeDisplay() {
      var n = calcVelocity();
      var grade = getGradeLabel(currentAccuracy);
      document.getElementById('level-display').textContent = currentAccuracy + '%';
      document.getElementById('velocity-display').textContent = 'n=' + n.toFixed(2);
    }

    function buildQDots() {
      const container = document.getElementById('q-dots');
      container.innerHTML = '';
      passages.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'q-dot' + (i === currentPassage ? ' active' : '');
        container.appendChild(dot);
      });
    }

    function showPassage(index) {
      if (index >= passages.length) { showCompletion(); return; }
      const p = passages[index];
      filledBlanks = {};
      activeBlankId = null;

      document.getElementById('passage-subject').textContent = p.subject;
      document.getElementById('passage-hint').textContent = p.hint;
      document.getElementById('q-counter').textContent = `${index + 1}/${passages.length}`;

      // Build passage text with blank placeholders
      document.getElementById('passage-text').innerHTML = p.text.replace(/___([①②③④⑤])___/g,
        '<span class="blank" data-blank="$1" onclick="selectBlank(this)">___$1___</span>'
      );

      // Build word bank
      const bank = document.getElementById('word-bank');
      bank.innerHTML = '';
      const allWords = [...p.blanks.map(b => b.answer), ...p.distractors].sort(() => Math.random() - 0.5);
      allWords.forEach(word => {
        const chip = document.createElement('button');
        chip.className = 'word-chip';
        chip.textContent = word;
        chip.onclick = () => selectWord(chip, word);
        bank.appendChild(chip);
      });

      document.getElementById('feedback-bar').style.display = 'none';
      document.getElementById('check-btn').disabled = true;
      document.getElementById('check-btn').textContent = '✅ Tekshirish';

      buildQDots();
    }

    function selectBlank(el) {
      if (el.classList.contains('filled-correct') || el.classList.contains('filled-wrong')) return;
      // Deselect previous
      document.querySelectorAll('.blank').forEach(b => b.style.outline = '');
      el.style.outline = '2px solid hsl(var(--warning))';
      activeBlankId = el.dataset.blank;
    }

    function selectWord(chip, word) {
      if (!activeBlankId) return;
      const blank = document.querySelector(`.blank[data-blank="${activeBlankId}"]`);
      if (!blank) return;

      filledBlanks[activeBlankId] = word;
      blank.textContent = word;
      blank.classList.add('filled');
      blank.style.outline = '';

      chip.classList.add('used');
      activeBlankId = null;

      // Check if all blanks filled
      const blanks = document.querySelectorAll('.blank');
      const allFilled = Array.from(blanks).every(b => filledBlanks[b.dataset.blank]);
      document.getElementById('check-btn').disabled = !allFilled;
    }

    function checkAnswers() {
      const p = passages[currentPassage];
      let correct = 0;
      const total = p.blanks.length;

      p.blanks.forEach(blank => {
        const el = document.querySelector(`.blank[data-blank="${blank.id}"]`);
        const userAnswer = filledBlanks[blank.id] || '';
        if (userAnswer === blank.answer) {
          el.classList.add('filled-correct');
          correct++;
        } else {
          el.classList.add('filled-wrong');
          el.textContent = `${userAnswer} → ${blank.answer}`;
        }
      });

      totalCorrect += correct;
      totalFills += total;
      totalAttempts += total;
      correctCount += correct;

      // Update accuracy
      currentAccuracy = totalFills > 0 ? Math.round((totalCorrect / totalFills) * 100) : 0;
      updateGradeDisplay();

      // Feedback
      const fb = document.getElementById('feedback-bar');
      fb.style.display = 'flex';
      if (correct === total) {
        fb.className = 'feedback-bar perfect';
        fb.textContent = `🎉 Mukammal! ${correct}/${total} to'g'ri`;
      } else if (correct > 0) {
        fb.className = 'feedback-bar correct';
        fb.textContent = `✅ ${correct}/${total} to'g'ri!`;
      } else {
        fb.className = 'feedback-bar wrong';
        fb.textContent = `❌ Xato. To'g'ri javoblar ko'rsatildi.`;
      }

      // Disable word bank
      document.querySelectorAll('.word-chip').forEach(c => { c.style.pointerEvents = 'none'; });

      // Change button to Next
      const btn = document.getElementById('check-btn');
      btn.textContent = '➡️ Keyingi';
      btn.disabled = false;
      btn.onclick = nextPassage;
    }

    function nextPassage() {
      currentPassage++;
      showPassage(currentPassage);
    }

    function showToast(text) {
      const toast = document.getElementById('xp-toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function showCompletion() {
      document.getElementById('game-area').style.display = 'none';

      // Add session to history
      sessionHistory.push({
        session: sessionHistory.length + 1,
        accuracy: currentAccuracy,
        timePerAnswer: 14,
        hints: 0
      });

      var n = calcVelocity();
      var grade = getGradeLabel(currentAccuracy);
      var sessionsToProficient = Math.max(1, Math.ceil((60 - currentAccuracy) / 15));

      // Populate grade card
      document.getElementById('grade-level').textContent = currentAccuracy + '%';
      document.getElementById('grade-label').textContent = grade.label;
      document.getElementById('grade-velocity').textContent = 'Velocity: n=' + n.toFixed(2) + (n > 0.3 ? ' (improving)' : '');
      document.getElementById('grade-speed').textContent = 'Fills correct: ' + totalCorrect + '/' + totalFills;
      document.getElementById('grade-progress').textContent = '~' + sessionsToProficient + ' sessions to Proficient';

      document.getElementById('final-correct').textContent = totalCorrect;
      document.getElementById('final-accuracy').textContent = currentAccuracy + '%';
      document.getElementById('final-total').textContent = totalFills;

      document.getElementById('completion-panel').style.display = 'block';
      launchConfetti();
    }

    function restartGame() {
      currentPassage = 0;
      totalCorrect = 0;
      totalFills = 0;
      currentAccuracy = 0;
      totalAttempts = 0;
      correctCount = 0;
      filledBlanks = {};

      updateGradeDisplay();
      document.getElementById('game-area').style.display = 'block';
      document.getElementById('completion-panel').style.display = 'none';

      const btn = document.getElementById('check-btn');
      btn.textContent = '✅ Tekshirish';
      btn.onclick = checkAnswers;

      showPassage(0);
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const pieces = [];
      const colors = ['#10B981', '#06D6A0', '#F59E0B', '#8B5CF6', '#EF4444', '#3B82F6'];
      for (let i = 0; i < 120; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 8 + 4,
          h: Math.random() * 4 + 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          vy: Math.random() * 3 + 2,
          vx: (Math.random() - 0.5) * 2,
          rot: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10
        });
      }
      let frames = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
          p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
        });
        frames++;
        if (frames < 300) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
    }

    showPassage(0);
  </script>
</body>
</html>
