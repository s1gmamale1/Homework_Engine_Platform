<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>NETS — Elite Territory Conquest Demo</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --primary: #58a6ff;
            --gold: #d29922;
            --accent: #bc8cff;
            --fog: #090c10;
            
            /* Player Colors */
            --p0: #238636; /* Student */
            --p1: #da3633; /* AI 1 */
            --p2: #8957e5; /* AI 2 */
            --p3: #d29922; /* AI 3 */
            --p4: #1f6feb; /* AI 4 */
            --p5: #f85149; /* AI 5 */
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0; 
        }

        #setup-screen {
            max-width: 500px;
            background: var(--surface);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            text-align: center;
        }

        #game-screen { display: none; align-items: center; flex-direction: column; }

        .grid { 
            display: grid; 
            gap: 4px; 
            background: var(--border);
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .tile { 
            width: 40px; 
            height: 40px; 
            background: var(--fog); 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.7rem;
            cursor: not-allowed;
            transition: all 0.2s;
            position: relative;
        }

        .tile.visible { background: #21262d; cursor: pointer; }
        .tile.p0 { background: var(--p0); color: white; cursor: default; }
        .tile.p1 { background: var(--p1); color: white; cursor: default; }
        .tile.p2 { background: var(--p2); color: white; cursor: default; }
        .tile.p3 { background: var(--p3); color: white; cursor: default; }
        .tile.p4 { background: var(--p4); color: white; cursor: default; }
        .tile.p5 { background: var(--p5); color: white; cursor: default; }
        
        .tile.capital { border: 2px solid white; box-shadow: inset 0 0 8px white; z-index: 5; }
        
        .tile:hover.visible:not([class*="p"]) { filter: brightness(1.5); transform: scale(1.1); z-index: 10; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .stat-card { background: var(--surface); padding: 10px; border-radius: 8px; border: 1px solid var(--border); text-align: center; font-size: 0.8rem; }

        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--surface); border: 2px solid var(--primary); 
            padding: 30px; border-radius: 15px; display: none; width: 320px; z-index: 100;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        .log-panel { 
            width: 500px; 
            height: 100px; 
            background: var(--surface); 
            margin-top: 20px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 10px; 
            font-size: 0.75rem; 
            overflow-y: auto;
            color: #8b949e;
        }

        button { padding: 10px 20px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: #21262d; color: white; margin: 5px; }
        button:hover { border-color: var(--primary); }
        .premium-btn { border-color: var(--gold); color: var(--gold); font-weight: bold; }
        .start-btn { background: var(--primary); border: none; width: 100%; margin-top: 20px; font-weight: bold; }

        .active-buff { color: var(--gold); font-size: 0.7rem; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen">
        <h2 style="color: var(--gold)">NETS CONQUEST: ELITE</h2>
        <p>Select your battle parameters</p>
        
        <div style="margin: 20px 0;">
            <strong>Mode:</strong><br>
            <button id="mode-ffa" class="active" onclick="setMode('ffa')">Free for All</button>
            <button id="mode-horde" class="premium-btn" onclick="setMode('horde')">One for All (Horde)</button>
        </div>

        <div style="margin: 20px 0;">
            <strong>Enemies:</strong><br>
            <button onclick="setEnemies(1)">1 AI</button>
            <button onclick="setEnemies(3)">3 AI</button>
            <button class="premium-btn" onclick="setEnemies(5)">5 AI (Max)</button>
        </div>

        <div style="margin: 20px 0;">
            <strong>Premium Buffs:</strong><br>
            <button id="buff-blitz" onclick="toggleBuff('blitz')">Blitz Move (+1 AP)</button>
            <button id="buff-immunity" onclick="toggleBuff('immunity')">Diplomatic Immunity (2 Free)</button>
        </div>

        <button class="start-btn" onclick="startGame()">⚔️ ENTER BATTLEFIELD</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen">
        <div class="stats-grid" id="stats-grid"></div>
        
        <div style="margin-bottom: 10px; text-align: center;">
            <span id="game-info" style="font-weight: bold; color: var(--primary);">Turn 1/12</span><br>
            <span id="ap-info" style="font-size: 0.9rem;">AP: 2</span>
            <div id="active-buffs" class="active-buff"></div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="log-panel" id="log"></div>
    </div>

    <!-- CHALLENGE MODAL -->
    <div id="modal" class="modal">
        <span id="q-level" style="font-size: 0.7rem; font-weight: bold; color: var(--primary);">PISA LEVEL 1</span>
        <h3 style="margin: 10px 0;">Battle Challenge</h3>
        <p id="q-text">Loading retrieval challenge...</p>
        <button onclick="resolve(true)" style="background: var(--p0); width: 100%; border:none;">Correct Answer</button>
        <button onclick="resolve(false)" style="background: #30363d; width: 100%; border:none; margin-top: 5px;">Fail</button>
    </div>

    <script>
        let config = { mode: 'ffa', enemies: 1, buffs: [] };
        let state = { turn: 1, ap: 2, grid: [], pCount: 1, currentPlayer: 0, immunityCharges: 0 };
        let mapSize = 8;
        let players = [];

        function setMode(m) {
            config.mode = m;
            document.querySelectorAll('[id^="mode-"]').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + m).classList.add('active');
        }

        function setEnemies(n) {
            config.enemies = n;
            mapSize = n >= 5 ? 12 : (n >= 3 ? 10 : 8);
            logSystem(`Map adjusted to ${mapSize}x${mapSize} for ${n+1} players.`);
        }

        function toggleBuff(b) {
            if(config.buffs.includes(b)) config.buffs = config.buffs.filter(x => x !== b);
            else config.buffs.push(b);
            document.getElementById('buff-' + b).classList.toggle('active');
        }

        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            // Initialize Players
            players = [{ id: 0, name: 'Student', color: 'p0', type: 'human', alive: true }];
            for(let i=1; i<=config.enemies; i++) {
                players.push({ id: i, name: 'AI ' + i, color: 'p' + i, type: 'ai', alive: true });
            }

            // Buff Effects
            if(config.buffs.includes('blitz')) state.ap = 3;
            if(config.buffs.includes('immunity')) state.immunityCharges = 2;

            initGrid();
            updateStats();
            logSystem(`Battle Started! Mode: ${config.mode.toUpperCase()}`);
        }

        function initGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${mapSize}, 40px)`;
            
            for(let r=0; r<mapSize; r++) {
                state.grid[r] = [];
                for(let c=0; c<mapSize; c++) {
                    state.grid[r][c] = { r, c, owner: null, capital: false };
                    const el = document.createElement('div');
                    el.id = `t-${r}-${c}`;
                    el.className = 'tile';
                    el.onclick = () => handleTileClick(r, c);
                    gridEl.appendChild(el);
                }
            }

            // Assign Capitals
            players.forEach(p => {
                let r, c;
                if(p.id === 0) { r = 0; c = 0; }
                else if(p.id === 1) { r = mapSize-1; c = mapSize-1; }
                else if(p.id === 2) { r = 0; c = mapSize-1; }
                else if(p.id === 3) { r = mapSize-1; c = 0; }
                else { r = Math.floor(mapSize/2); c = (p.id === 4 ? 0 : mapSize-1); }
                
                state.grid[r][c].owner = p.id;
                state.grid[r][c].capital = true;
            });

            updateDisplay();
        }

        function updateDisplay() {
            players.forEach(p => p.tiles = 0);
            for(let r=0; r<mapSize; r++) {
                for(let c=0; c<mapSize; c++) {
                    const t = state.grid[r][c], el = document.getElementById(`t-${r}-${c}`);
                    el.className = 'tile';
                    
                    let visible = false;
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            let nr = r+dr, nc = c+dc;
                            if(nr>=0 && nr<mapSize && nc>=0 && nc<mapSize && state.grid[nr][nc].owner === 0) visible = true;
                        }
                    }

                    if(visible || t.owner !== null) {
                        el.classList.add('visible');
                        if(t.owner !== null) {
                            el.classList.add(players[t.owner].color);
                            el.innerText = t.owner === 0 ? 'S' : 'A' + t.owner;
                            if(t.capital) el.classList.add('capital');
                            players[t.owner].tiles++;
                        }
                    }
                }
            }
            updateStats();
        }

        function handleTileClick(r, c) {
            if(state.currentPlayer !== 0 || state.ap <= 0) return;
            const t = state.grid[r][c];
            if(t.owner === 0 || !document.getElementById(`t-${r}-${c}`).classList.contains('visible')) return;

            if(state.immunityCharges > 0 && !t.capital) {
                state.immunityCharges--;
                logSystem(`DIPLOMATIC IMMUNITY: Territory Captured instantly!`);
                capture(0, t);
                return;
            }

            const dist = Math.abs(r) + Math.abs(c);
            const lvl = Math.min(6, Math.max(1, Math.floor(dist/2)));
            showChallenge(t, lvl);
        }

        function showChallenge(t, lvl) {
            const m = document.getElementById('modal');
            document.getElementById('q-level').innerText = `PISA LEVEL ${lvl}`;
            document.getElementById('q-text').innerText = `Retrieval Challenge for [${t.r},${t.c}]. Distance Penalty applied.`;
            state.target = t;
            m.style.display = 'block';
        }

        function resolve(success) {
            document.getElementById('modal').style.display = 'none';
            state.ap--;
            if(success) {
                capture(0, state.target);
            } else {
                logSystem(`Attack failed! Turn Momentum lost.`);
                state.ap = 0;
            }
            if(state.ap <= 0) nextTurn();
            else updateDisplay();
        }

        function capture(pId, t) {
            t.owner = pId;
            logSystem(`${players[pId].name} captured [${t.r}, ${t.c}]`);
            updateDisplay();
        }

        function nextTurn() {
            state.currentPlayer++;
            if(state.currentPlayer >= players.length) {
                state.currentPlayer = 0;
                state.turn++;
                state.ap = (config.buffs.includes('blitz') && state.turn <= 3) ? 3 : 2;
                document.getElementById('game-info').innerText = `Turn ${state.turn}/12`;
            }

            if(players[state.currentPlayer].type === 'ai' && players[state.currentPlayer].alive) {
                document.getElementById('game-info').innerText = `${players[state.currentPlayer].name} Moving...`;
                setTimeout(aiMove, 600);
            } else {
                document.getElementById('ap-info').innerText = `AP: ${state.ap}`;
                updateDisplay();
            }
        }

        function aiMove() {
            const p = players[state.currentPlayer];
            const myTiles = [];
            for(let r=0; r<mapSize; r++) {
                for(let c=0; c<mapSize; c++) {
                    if(state.grid[r][c].owner === p.id) myTiles.push(state.grid[r][c]);
                }
            }

            const targets = [];
            myTiles.forEach(mt => {
                for(let dr=-1; dr<=1; dr++) {
                    for(let dc=-1; dc<=1; dc++) {
                        let nr=mt.r+dr, nc=mt.c+dc;
                        if(nr>=0 && nr<mapSize && nc>=0 && nc<mapSize) {
                            const nt = state.grid[nr][nc];
                            if(nt.owner !== p.id) {
                                // In Horde mode, AIs don't attack each other
                                if(config.mode === 'horde' && nt.owner !== null && nt.owner !== 0) continue;
                                targets.push(nt);
                            }
                        }
                    }
                }
            });

            if(targets.length > 0) {
                capture(p.id, targets[Math.floor(Math.random()*targets.length)]);
            }
            
            // Random Mutiny Check
            if(Math.random() < 0.02) {
                logSystem(`⚠️ AI REINFORCEMENTS DETECTED!`, 'event-notif');
            }

            nextTurn();
        }

        function updateStats() {
            const g = document.getElementById('stats-grid');
            g.innerHTML = '';
            players.forEach(p => {
                const c = document.createElement('div');
                c.className = 'stat-card';
                c.style.borderColor = `var(--${p.color})`;
                c.innerHTML = `<strong>${p.name}</strong><br>${p.tiles} Tiles`;
                g.appendChild(c);
            });
            document.getElementById('ap-info').innerText = `AP: ${state.ap}`;
            const buffs = document.getElementById('active-buffs');
            buffs.innerText = (state.immunityCharges > 0 ? `🛡️ Immunity: ${state.immunityCharges} ` : '') + 
                              (config.buffs.includes('blitz') && state.turn <= 3 ? `⚡ Blitz Active` : '');
        }

        function logSystem(m, cls='') {
            const l = document.getElementById('log');
            const d = document.createElement('div');
            if(cls) d.className = cls;
            d.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${m}`;
            l.prepend(d);
        }

        logSystem("System Ready. Waiting for player setup.");
    </script>
</body>
</html>
