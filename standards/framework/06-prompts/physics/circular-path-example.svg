<svg width="290" height="180" viewBox="0 0 290 180" xmlns="http://www.w3.org/2000/svg">
  <circle cx="75" cy="90" r="48" fill="none" stroke="#2ca02c" stroke-width="3"/>
  <text x="35" y="22" font-size="14">s = 75 m</text>
  <path d="M75 42 L83 54 L67 54 Z" fill="#2ca02c"/>
  <text x="150" y="70" font-size="16">v = 5 m/s</text>
  <text x="150" y="100" font-size="16">t = s / v</text>
  <text x="150" y="130" font-size="16">t = 75 / 5 = 15 s</text>
</svg>
